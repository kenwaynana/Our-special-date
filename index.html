<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Special Date With You</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to bottom right, #ffc0cb, #ff69b4);
    color: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
}

.card {
    background: rgba(255, 255, 255, 0.3);
    padding: 50px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    max-width: 500px;
    position: relative;
    z-index: 1;
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    margin-bottom: 15px;
}

p {
    font-size: 18px;
    margin-bottom: 25px;
    line-height: 1.6;
}

input[type="date"] {
    padding: 10px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    margin-bottom: 20px;
}

button {
    padding: 12px 25px;
    font-size: 16px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    margin: 10px;
    transition: 0.3s;
}

.yes {
    background: #ff69b4;
    color: #fff;
}

.yes:hover {
    background: #ff1493;
    transform: scale(1.05);
}

.no {
    background: transparent;
    border: 1px solid #fff;
    color: #fff;
}

.hidden {
    display: none;
    margin-top: 20px;
    font-size: 20px;
    color: #ff1493;
}

#playMusic {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(255,182,193,0.9);
    padding: 10px 20px;
    border-radius: 50px;
    color: #1a1a1a;
    font-weight: bold;
    cursor: pointer;
    z-index: 999;
}

footer {
    position: absolute;
    bottom: 20px;
    font-size: 12px;
    opacity: 0.6;
}

/* Floating rotating hearts */
.heart {
    position: absolute;
    color: #ff1493;
    user-select: none;
    animation: floatRotate 5s linear infinite;
    opacity: 0;
}

@keyframes floatRotate {
    0% { transform: translateY(0) translateX(0) rotate(0deg) scale(0); opacity: 0; }
    10% { opacity: 1; scale: 1; }
    100% { transform: translateY(-600px) translateX(var(--x)) rotate(360deg) scale(1.2); opacity: 0; }
}
</style>
</head>
<body>

<div class="card">
    <h1>For My Favorite Person 💫</h1>
    <p>
        Every moment with you feels different… better.<br>
        So I was thinking…<br><br>
        Will you let me take you on a special date?
    </p>

    <input type="date" id="datePicker">
    <br>

    <button class="yes" onclick="sayYes()">Yes, of course 💖</button>
    <button class="no" onclick="moveNo()">Hmm…</button>

    <div id="response" class="hidden"></div>
</div>

<footer>Made with love 💌</footer>

<!-- Background music -->
<audio id="bgMusic" loop>
  <source src="https://drive.google.com/uc?export=download&id=1A_WS6pyRq5oX-KReaOsFNaM8otAsmfLH" type="audio/mp3">
</audio>

<!-- Play Music Button -->
<button id="playMusic">🎵 Play Music</button>

<script>
const music = document.getElementById("bgMusic");
const btn = document.getElementById("playMusic");

// Start music on click or autoplay
function playMusic() {
    music.play().catch(() => {
        // If blocked, wait for user interaction
        document.body.addEventListener('click', playMusic, { once: true });
    });
}

// Play music immediately
playMusic();

// Hide button after clicked
btn.addEventListener("click", () => {
    music.play();
    btn.style.display = "none";
});

// Stop music after 10 minutes
setTimeout(() => {
    music.pause();
    music.currentTime = 0;
}, 600000);

// Yes/No buttons
function sayYes() {
    const date = document.getElementById("datePicker").value;
    const response = document.getElementById("response");
    if (date === "") {
        response.innerHTML = "Pick a date first, my heart 😌";
        response.classList.remove("hidden");
        return;
    }
    response.innerHTML = "It's a date 💕 I’ll make " + date + " unforgettable.";
    response.classList.remove("hidden");
}

function moveNo() {
    const button = document.querySelector(".no");
    const x = Math.random() * 200 - 100;
    const y = Math.random() * 200 - 100;
    button.style.transform = `translate(${x}px, ${y}px)`;
}

// Floating hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = (12 + Math.random()*24) + "px";
    const drift = (Math.random() * 200 - 100) + "px";
    heart.style.setProperty('--x', drift);
    heart.innerText = "❤️ I love Raven";
    document.body.appendChild(heart);
    setTimeout(() => {
        heart.remove();
    }, 5000);
}
setInterval(createHeart, 500);
</script>

</body>
</html>
