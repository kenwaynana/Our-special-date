<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Special Date With You</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(to bottom right, #1a1a1a, #3b0a45);
        color: #f8f8f8;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
    }

    .card {
        background: rgba(255, 255, 255, 0.05);
        padding: 50px;
        border-radius: 20px;
        backdrop-filter: blur(15px);
        box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        max-width: 500px;
    }

    h1 {
        font-family: 'Playfair Display', serif;
        font-size: 36px;
        margin-bottom: 15px;
    }

    p {
        font-size: 18px;
        margin-bottom: 25px;
        line-height: 1.6;
    }

    input[type="date"] {
        padding: 10px;
        border-radius: 10px;
        border: none;
        font-size: 16px;
        margin-bottom: 20px;
    }

    button {
        padding: 12px 25px;
        font-size: 16px;
        border-radius: 30px;
        border: none;
        cursor: pointer;
        margin: 10px;
        transition: 0.3s;
    }

    .yes {
        background: #e6b422;
        color: #1a1a1a;
    }

    .yes:hover {
        background: #ffd700;
        transform: scale(1.05);
    }

    .no {
        background: transparent;
        border: 1px solid #fff;
        color: #fff;
    }

    .hidden {
        display: none;
        margin-top: 20px;
        font-size: 20px;
        color: #ffd700;
    }

    footer {
        position: absolute;
        bottom: 20px;
        font-size: 12px;
        opacity: 0.6;
    }
</style>
</head>

<body>

<!-- Background music -->
<audio id="bgMusic" loop>
    <source src="https://drive.google.com/uc?export=download&id=1A_WS6pyRq5oX-KReaOsFNaM8otAsmfLH" type="audio/mp3">
</audio>

<div class="card">
    <h1>For My Favorite Person 💫</h1>
    <p>
        Every moment with you feels different… better.<br>
        So I was thinking…<br><br>
        Will you let me take you on a special date?
    </p>

    <input type="date" id="datePicker">
    <br>

    <button class="yes" onclick="sayYes()">Yes, of course 💖</button>
    <button class="no" onclick="moveNo()">Hmm…</button>

    <div id="response" class="hidden"></div>
</div>

<footer>Made with love 💌</footer>

<script>
const music = document.getElementById("bgMusic");
document.body.addEventListener("click", () => {
    music.play();
}, { once: true });

function sayYes() {
    const date = document.getElementById("datePicker").value;
    const response = document.getElementById("response");

    if (date === "") {
        response.innerHTML = "Pick a date first, beautiful 😌";
        response.classList.remove("hidden");
        return;
    }

    response.innerHTML = "It's a date 💕 I’ll make " + date + " unforgettable.";
    response.classList.remove("hidden");
}

function moveNo() {
    const button = document.querySelector(".no");
    const x = Math.random() * 200 - 100;
    const y = Math.random() * 200 - 100;
    button.style.transform = `translate(${x}px, ${y}px)`;
}
</script>

</body>
</html>
