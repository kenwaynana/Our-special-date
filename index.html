<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Special Date With You</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to bottom right, #ffc0cb, #ff69b4);
    color: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
}

.card {
    background: rgba(255, 255, 255, 0.3);
    padding: 50px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    max-width: 500px;
    position: relative;
    z-index: 1;
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    margin-bottom: 15px;
}

p {
    font-size: 18px;
    margin-bottom: 25px;
    line-height: 1.6;
}

input[type="date"] {
    padding: 10px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    margin-bottom: 20px;
}

button {
    padding: 12px 25px;
    font-size: 16px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    margin: 10px;
    transition: 0.3s;
}

.yes {
    background: #ff69b4;
    color: #fff;
}

.yes:hover {
    background: #ff1493;
    transform: scale(1.05);
}

.no {
    background: transparent;
    border: 1px solid #fff;
    color: #fff;
}

.hidden {
    display: none;
    margin-top: 20px;
    font-size: 20px;
    color: #ff1493;
}

#musicNotice {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(255,182,193,0.9);
    padding: 10px 20px;
    border-radius: 50px;
    color: #1a1a1a;
    font-weight: bold;
    cursor: pointer;
    z-index: 999;
    display: none;
    opacity: 0;
    transition: opacity 0.5s ease, transform 0.5s ease;
}

.pulsing {
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); box-shadow: 0 0 0 rgba(255,182,193,0.7); }
    50% { transform: scale(1.1); box-shadow: 0 0 20px rgba(255,182,193,0.7); }
    100% { transform: scale(1); box-shadow: 0 0 0 rgba(255,182,193,0.7); }
}

footer {
    position: absolute;
    bottom: 20px;
    font-size: 12px;
    opacity: 0.6;
}

/* Floating hearts animation */
.heart {
    position: absolute;
    font-size: 16px;
    color: #ff1493;
    animation: float 5s linear infinite;
    user-select: none;
}

@keyframes float {
    0% { transform: translateY(0) translateX(0) scale(1); opacity: 1; }
    100% { transform: translateY(-600px) translateX(var(--x)) scale(1.2); opacity: 0; }
}
</style>
</head>
<body>

<div class="card">
    <h1>For My Favorite Person 💫</h1>
    <p>
        Every moment with you feels different… better.<br>
        So I was thinking…<br><br>
        Will you let me take you on a special date?
    </p>

    <input type="date" id="datePicker">
    <br>

    <button class="yes" onclick="sayYes()">Yes, of course 💖</button>
    <button class="no" onclick="moveNo()">Hmm…</button>

    <div id="response" class="hidden"></div>
</div>

<footer>Made with love 💌</footer>

<!-- Background music -->
<audio id="bgMusic" loop>
  <source src="IndiaPt2.mp3" type="audio/mp3">
</audio>

<!-- Music notice / play button -->
<div id="musicNotice">🎵 Music Playing (Tap to Start)</div>

<script>
const music = document.getElementById("bgMusic");
const notice = document.getElementById("musicNotice");

// Try autoplay
music.play().then(() => {
    showNotice();
    setTimeout(hideNotice, 2000);
}).catch(() => {
    // Mobile: show notice as button
    showNotice();
    notice.addEventListener("click", () => {
        music.play();
        hideNotice();
    }, { once: true });
});

function showNotice() {
    notice.style.display = "block";
    notice.style.opacity = "1";
    notice.classList.add("pulsing");
}

function hideNotice() {
    notice.style.opacity = "0";
    setTimeout(() => { notice.style.display = "none"; }, 500);
}

// Card button functions
function sayYes() {
    const date = document.getElementById("datePicker").value;
    const response = document.getElementById("response");
    if (date === "") {
        response.innerHTML = "Pick a date first, beautiful 😌";
        response.classList.remove("hidden");
        return;
    }
    response.innerHTML = "It's a date 💕 I’ll make " + date + " unforgettable.";
    response.classList.remove("hidden");
}

function moveNo() {
    const button = document.querySelector(".no");
    const x = Math.random() * 200 - 100;
    const y = Math.random() * 200 - 100;
    button.style.transform = `translate(${x}px, ${y}px)`;
}

// Floating hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = (12 + Math.random()*24) + "px";
    const drift = (Math.random() * 200 - 100) + "px";
    heart.style.setProperty('--x', drift);
    heart.innerText = "❤️ I love Raven";
    document.body.appendChild(heart);
    setTimeout(() => {
        heart.remove();
    }, 5000);
}
setInterval(createHeart, 500);
</script>

</body>
</html>
